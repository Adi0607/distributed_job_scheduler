spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/jobscheduler
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

scheduler:
  batch-size: 50
  poll-interval-ms: 5000
  worker:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 200

handlers:
  email:
    failure-rate: 0.10
    min-delay-ms: 100
    max-delay-ms: 300
  http-callback:
    connect-timeout-ms: 5000
    read-timeout-ms: 10000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.jobscheduler: INFO
    org.hibernate.SQL: WARN
